<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Poker Night — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d2818;
      color: #f5f0e8;
      font-family: system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      padding-top: calc(2rem + env(safe-area-inset-top));
      padding-bottom: calc(2rem + env(safe-area-inset-bottom));
    }
    .card {
      font-size: 5rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      color: #c9a74a;
    }
    p {
      color: #9ca3af;
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 300px;
    }
    button {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #1a472a;
      color: #f5f0e8;
      border: 1px solid #235c38;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      min-height: 44px;
    }
    button:active { background: #235c38; }
  </style>
</head>
<body>
  <div class="card">🃏</div>
  <h1>You're offline</h1>
  <p>Check your connection and try again to rejoin the game.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
